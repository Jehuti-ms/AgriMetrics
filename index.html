    <!-- Minimal Floating Sync Indicator - Self-contained, won't break anything -->
<style>
    /* ALL sync styles are here - completely separate from your main CSS */
    .agri-float-sync {
        position: fixed;
        bottom: 15px;
        right: 15px;
        background: rgba(33, 33, 33, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-radius: 40px;
        padding: 8px 18px;
        font-size: 13px;
        color: white;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        border: 1px solid rgba(255,255,255,0.15);
        z-index: 999999;
        display: none;
        align-items: center;
        gap: 10px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        pointer-events: none;
        transition: opacity 0.2s;
        letter-spacing: 0.3px;
    }
    
    .agri-sync-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #4CAF50;
        box-shadow: 0 0 8px #4CAF50;
        animation: agriPulse 2s infinite;
    }
    
    .agri-sync-dot.syncing {
        background: #2196F3;
        box-shadow: 0 0 8px #2196F3;
        animation: agriRotate 1s infinite;
    }
    
    .agri-sync-dot.error {
        background: #f44336;
        box-shadow: 0 0 8px #f44336;
        animation: none;
    }
    
    .agri-sync-button {
        position: fixed;
        bottom: 15px;
        right: 15px;
        background: #2196F3;
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 13px;
        font-weight: 500;
        color: white;
        box-shadow: 0 4px 15px rgba(33,150,243,0.3);
        z-index: 1000000;
        display: none;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        border: none;
        transition: all 0.2s ease;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        letter-spacing: 0.3px;
    }
    
    .agri-sync-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(33,150,243,0.4);
        background: #1976D2;
    }
    
    .agri-sync-button:active {
        transform: translateY(0);
    }
    
    .agri-sync-button.syncing {
        background: #666;
        pointer-events: none;
        opacity: 0.8;
    }
    
    @keyframes agriPulse {
        0% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(1.2); }
        100% { opacity: 1; transform: scale(1); }
    }
    
    @keyframes agriRotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }
    
    /* Mobile adjustments - still separate */
    @media (max-width: 480px) {
        .agri-float-sync {
            bottom: 10px;
            right: 10px;
            padding: 6px 14px;
            font-size: 12px;
        }
        
        .agri-sync-button {
            bottom: 10px;
            right: 10px;
            padding: 6px 16px;
            font-size: 12px;
        }
    }
</style>

    <script>
    // OVERRIDE FIREBASE AUTO-LOGIN - RUNS FIRST
    (function() {
        console.log('🔧 PREVENTING AUTO-LOGIN');
        
        // Block Firebase from auto-signing in
        Object.defineProperty(window, 'firebase', {
            get: function() {
                return window._firebase;
            },
            set: function(value) {
                console.log('🔥 Firebase loaded, intercepting...');
                window._firebase = value;
                
                // Once Firebase is loaded, prevent auto-signin
                setTimeout(() => {
                    if (window._firebase && window._firebase.auth) {
                        console.log('🚫 Signing out immediately');
                        window._firebase.auth().signOut().catch(() => {});
                    }
                }, 0);
            }
        });
        
        // Clear storage
        localStorage.clear();
        sessionStorage.clear();
        
        // Set initial state
        document.body.className = 'loading';
        
        // Show splash
        const splash = document.getElementById('splash-screen');
        if (splash) {
            splash.classList.remove('hidden');
            splash.classList.add('active');
        }
    })();

    
// ==================== AGRI SYNC INDICATOR - SELF CONTAINED ====================
(function() {
    // Get elements
    const indicator = document.getElementById('agriSyncIndicator');
    const button = document.getElementById('agriSyncButton');
    const dot = document.getElementById('agriSyncDot');
    const text = document.getElementById('agriSyncText');
    
    // Check if user is logged in (adjust this based on your auth system)
    function isUserLoggedIn() {
        return localStorage.getItem('agrimetricsUser') !== null || 
               localStorage.getItem('currentUser') !== null ||
               localStorage.getItem('user') !== null;
    }
    
    // Update sync status
    window.updateAgriSyncStatus = function(status, type) {
        if (!indicator || !dot || !text) return;
        
        indicator.style.display = isUserLoggedIn() ? 'flex' : 'none';
        
        if (!isUserLoggedIn()) return;
        
        text.textContent = status;
        
        // Update dot based on type
        dot.className = 'agri-sync-dot';
        if (type === 'syncing') {
            dot.classList.add('syncing');
            if (button) button.classList.add('syncing');
        } else if (type === 'error') {
            dot.classList.add('error');
            if (button) button.classList.remove('syncing');
        } else {
            if (button) button.classList.remove('syncing');
        }
        
        // Update colors
        if (type === 'syncing') {
            dot.style.background = '#2196F3';
            dot.style.boxShadow = '0 0 8px #2196F3';
        } else if (type === 'error') {
            dot.style.background = '#f44336';
            dot.style.boxShadow = '0 0 8px #f44336';
        } else {
            dot.style.background = '#4CAF50';
            dot.style.boxShadow = '0 0 8px #4CAF50';
        }
        
        // Load last sync time
        loadLastSyncTime();
    };
    
    // Load last sync time
    function loadLastSyncTime() {
        const lastSync = localStorage.getItem('agrimetricsLastSync');
        if (lastSync && indicator) {
            const date = new Date(lastSync);
            indicator.title = `Last sync: ${date.toLocaleString()}`;
        }
    }
    
    // Manual sync function
    window.triggerAgriSync = function() {
        // Show syncing state
        window.updateAgriSyncStatus('Syncing...', 'syncing');
        
        // Disable button
        if (button) {
            button.style.pointerEvents = 'none';
            button.innerHTML = '<span>⏳</span><span>Syncing...</span>';
        }
        
        // Simulate sync (replace with your actual sync logic)
        setTimeout(() => {
            // Update last sync time
            localStorage.setItem('agrimetricsLastSync', new Date().toISOString());
            
            // Show success
            window.updateAgriSyncStatus('✓ Synced', 'success');
            
            // Restore button
            if (button) {
                button.style.pointerEvents = 'auto';
                button.innerHTML = '<span>🔄</span><span>Sync Now</span>';
            }
            
            // Revert to Connected after 2 seconds
            setTimeout(() => {
                window.updateAgriSyncStatus('Connected', 'connected');
            }, 2000);
            
        }, 1500);
    };
    
    // Initialize on load
    function init() {
        if (isUserLoggedIn()) {
            indicator.style.display = 'flex';
            if (button) button.style.display = 'flex';
            window.updateAgriSyncStatus('Connected', 'connected');
        } else {
            indicator.style.display = 'none';
            if (button) button.style.display = 'none';
        }
    }
    
    // Listen for storage events (login/logout in other tabs)
    window.addEventListener('storage', (e) => {
        if (e.key === 'agrimetricsUser' || e.key === 'currentUser' || e.key === 'user') {
            init();
        }
    });
    
    // Initialize
    init();
    
    // Check for updates every 30 seconds
    setInterval(() => {
        if (isUserLoggedIn()) {
            loadLastSyncTime();
        }
    }, 30000);
})();

    // Show splash screen first
    document.body.classList.add('loading');
    
    // After 3 seconds, show sign-in
    setTimeout(function() {
        document.body.classList.remove('loading');
        document.body.classList.add('auth-visible');
        
        // Add active class to auth container when ready
        document.getElementById('auth-container').classList.add('active');
    }, 3000);

</script>

<script>
    // COMPLETELY RESTRUCTURE THE AUTH CONTAINER FOR CENTERING
    (function() {
        function fixAuthCentering() {
            var container = document.getElementById('auth-container');
            if (!container) return;
            
            // Save the auth-forms content
            var authForms = container.querySelector('.auth-forms');
            if (!authForms) return;
            
            var formsContent = authForms.innerHTML;
            var formsClass = authForms.className;
            
            // Clear the container
            container.innerHTML = '';
            container.style.cssText = '';
            container.className = 'active';
            
            // Set proper styles
            container.style.position = 'fixed';
            container.style.top = '0';
            container.style.left = '0';
            container.style.width = '100%';
            container.style.height = '100%';
            container.style.background = 'linear-gradient(135deg, #4CAF50, #2E7D32, #1B5E20, #0D47A1)';
            container.style.zIndex = '999999';
            container.style.display = 'flex';
            container.style.alignItems = 'center';
            container.style.justifyContent = 'center';
            container.style.padding = '20px';
            container.style.boxSizing = 'border-box';
            
            // Create new centered structure
            var newAuthForms = document.createElement('div');
            newAuthForms.className = formsClass;
            newAuthForms.style.cssText = 'background: white; border-radius: 16px; padding: 40px; width: 90%; max-width: 420px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); margin: 0 auto;';
            newAuthForms.innerHTML = formsContent;
            
            // Add to container
            container.appendChild(newAuthForms);
            
            console.log('Auth container forcefully centered');
        }
        
        // Run when page loads
        window.addEventListener('load', fixAuthCentering);
        
        // Run again after a short delay
        setTimeout(fixAuthCentering, 300);
    })();
</script>

    <script>
    // FORCE SPLASH SCREEN THEN AUTH SCREEN
    (function() {
        // Override any auto-login
        localStorage.removeItem('user');
        sessionStorage.removeItem('user');
        
        // Set body to loading
        document.body.className = 'loading';
        
        // Show splash screen
        var splash = document.getElementById('splash-screen');
        if (splash) {
            splash.classList.remove('hidden');
            splash.classList.add('active');
        }
        
        // Hide auth container
        var authContainer = document.getElementById('auth-container');
        if (authContainer) {
            authContainer.classList.remove('active');
        }
        
        // Hide app container
        var appContainer = document.getElementById('app-container');
        if (appContainer) {
            appContainer.style.display = 'none';
        }
        
        // After 3 seconds, show auth screen
        setTimeout(function() {
            document.body.className = 'auth-visible';
            
            if (splash) {
                splash.classList.remove('active');
                splash.classList.add('hidden');
            }
            
            if (authContainer) {
                authContainer.classList.add('active');
            }
            
            if (appContainer) {
                appContainer.style.display = 'none';
            }
        }, 3000);
    })();
</script>

    <script>
    // FORCE LOGOUT AND SHOW SPLASH SCREEN
    (function() {
        console.log('🚀 Force logout and show splash screen');
        
        // Sign out from Firebase
        if (typeof firebase !== 'undefined' && firebase.auth) {
            firebase.auth().signOut().then(() => {
                console.log('✅ Signed out from Firebase');
            }).catch((error) => {
                console.log('❌ Sign out error:', error);
            });
        }
        
        // Clear all storage
        localStorage.clear();
        sessionStorage.clear();
        
        // Set body to loading
        document.body.className = 'loading';
        
        // Show splash screen
        const splash = document.getElementById('splash-screen');
        if (splash) {
            splash.classList.remove('hidden');
            splash.classList.add('active');
            console.log('✅ Splash screen activated');
        }
        
        // Hide auth container
        const authContainer = document.getElementById('auth-container');
        if (authContainer) {
            authContainer.classList.remove('active');
        }
        
        // Hide app container
        const appContainer = document.getElementById('app-container');
        if (appContainer) {
            appContainer.style.display = 'none';
        }
        
        // After 3 seconds, show auth screen
        setTimeout(() => {
            console.log('⏰ Showing auth screen');
            document.body.className = 'auth-visible';
            
            if (splash) {
                splash.classList.remove('active');
                splash.classList.add('hidden');
            }
            
            if (authContainer) {
                authContainer.classList.add('active');
            }
        }, 3000);
    })();
</script>

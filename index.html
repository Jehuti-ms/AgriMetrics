    <!-- Minimal Floating Sync Indicator - Self-contained, won't break anything -->
<style>
    /* ALL sync styles are here - completely separate from your main CSS */
    .agri-float-sync {
        position: fixed;
        bottom: 15px;
        right: 15px;
        background: rgba(33, 33, 33, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-radius: 40px;
        padding: 8px 18px;
        font-size: 13px;
        color: white;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        border: 1px solid rgba(255,255,255,0.15);
        z-index: 999999;
        display: none;
        align-items: center;
        gap: 10px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        pointer-events: none;
        transition: opacity 0.2s;
        letter-spacing: 0.3px;
    }
    
    .agri-sync-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #4CAF50;
        box-shadow: 0 0 8px #4CAF50;
        animation: agriPulse 2s infinite;
    }
    
    .agri-sync-dot.syncing {
        background: #2196F3;
        box-shadow: 0 0 8px #2196F3;
        animation: agriRotate 1s infinite;
    }
    
    .agri-sync-dot.error {
        background: #f44336;
        box-shadow: 0 0 8px #f44336;
        animation: none;
    }
    
    .agri-sync-button {
        position: fixed;
        bottom: 15px;
        right: 15px;
        background: #2196F3;
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 13px;
        font-weight: 500;
        color: white;
        box-shadow: 0 4px 15px rgba(33,150,243,0.3);
        z-index: 1000000;
        display: none;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        border: none;
        transition: all 0.2s ease;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        letter-spacing: 0.3px;
    }
    
    .agri-sync-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(33,150,243,0.4);
        background: #1976D2;
    }
    
    .agri-sync-button:active {
        transform: translateY(0);
    }
    
    .agri-sync-button.syncing {
        background: #666;
        pointer-events: none;
        opacity: 0.8;
    }
    
    @keyframes agriPulse {
        0% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(1.2); }
        100% { opacity: 1; transform: scale(1); }
    }
    
    @keyframes agriRotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }
    
    /* Mobile adjustments - still separate */
    @media (max-width: 480px) {
        .agri-float-sync {
            bottom: 10px;
            right: 10px;
            padding: 6px 14px;
            font-size: 12px;
        }
        
        .agri-sync-button {
            bottom: 10px;
            right: 10px;
            padding: 6px 16px;
            font-size: 12px;
        }
    }
</style>

<!-- Sync Indicator (always present, shown when logged in) -->
<div id="agriSyncIndicator" class="agri-float-sync">
    <span id="agriSyncDot" class="agri-sync-dot"></span>
    <span id="agriSyncText">Connected</span>
</div>

<!-- Sync Button (optional - for manual sync) -->
<button id="agriSyncButton" class="agri-sync-button" onclick="triggerAgriSync()">
    <span>🔄</span>
    <span>Sync Now</span>
</button>

<script>
// ==================== SIMPLE SYNC INDICATOR ====================
document.addEventListener('DOMContentLoaded', function() {
    console.log('🔧 Initializing sync indicator...');
    
    const indicator = document.getElementById('agriSyncIndicator');
    const button = document.getElementById('agriSyncButton');
    const dot = document.getElementById('agriSyncDot');
    const text = document.getElementById('agriSyncText');
    
    if (!indicator || !dot || !text) {
        console.log('⚠️ Sync elements not found');
        return;
    }
    
    function isUserLoggedIn() {
        return localStorage.getItem('agrimetricsUser') !== null || 
               localStorage.getItem('currentUser') !== null ||
               localStorage.getItem('user') !== null ||
               document.body.classList.contains('app-active');
    }
    
    window.updateAgriSyncStatus = function(status, type) {
        if (!indicator || !dot || !text) return;
        
        if (!isUserLoggedIn()) {
            indicator.style.display = 'none';
            if (button) button.style.display = 'none';
            return;
        }
        
        indicator.style.display = 'flex';
        text.textContent = status;
        
        dot.className = 'agri-sync-dot';
        if (type === 'syncing') {
            dot.classList.add('syncing');
        } else if (type === 'error') {
            dot.classList.add('error');
        }
    };
    
    window.triggerAgriSync = function() {
        window.updateAgriSyncStatus('Syncing...', 'syncing');
        
        setTimeout(() => {
            localStorage.setItem('agrimetricsLastSync', new Date().toISOString());
            window.updateAgriSyncStatus('✓ Synced', 'success');
            
            setTimeout(() => {
                window.updateAgriSyncStatus('Connected', 'connected');
            }, 2000);
        }, 1500);
    };
    
    // Initial state
    if (isUserLoggedIn()) {
        indicator.style.display = 'flex';
        if (button) button.style.display = 'flex';
        window.updateAgriSyncStatus('Connected', 'connected');
    } else {
        indicator.style.display = 'none';
        if (button) button.style.display = 'none';
    }
    
    console.log('✅ Sync indicator ready');
});
</script>
